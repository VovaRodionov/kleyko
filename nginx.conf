server {
    listen 80;
    server_name kleyko.com www.kleyko.com;

    root /var/www/kleyko;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    location / {
        # Try to serve request as file, then as directory, then try adding .html extension, finally 404
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404 page
    error_page 404 /404.html;
}
